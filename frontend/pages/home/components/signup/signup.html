<link rel="stylesheet" href="./components/signup/signup.css">

<div id="signupModal" class="signup-modal">
  <div class="signup-modal-wrapper">
    <div class="signup-modal-content">
      <div class="signup-modal-header">
        <div>
          <h5 class="signup-modal-title">Create Account</h5>
          <p class="signup-modal-subtitle">Join INSAT Events Community</p>
        </div>
        <button type="button" id="closeModal" class="signup-modal-close">×</button>
      </div>

      <div class="signup-modal-body">
        <form id="signupForm">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input name="first_name" type="text" placeholder="John" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input name="last_name" type="text" placeholder="Doe" class="form-input" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">University Email</label>
            <input name="email" type="email" placeholder="john.doe@insat.ucar.tn" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Birthdate</label>
            <input name="birthdate" type="date" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Academic Year</label>
            <select name="academic_year" class="form-select" required>
              <option disabled selected>Select your year</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
              <option>5th Year</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input name="password" type="password" placeholder="••••••••" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input name="password_confirmation" type="password" placeholder="••••••••" class="form-input" required>
          </div>

          <button type="submit" class="form-submit-btn">Create Account</button>

          <p class="form-signin-text">
            Already have an account?
            <a href="#" onclick="switchToSignin(event)">Sign in</a>
          </p>
        </form>
                <!-- Toast succès -->
        <div id="toastSuccess" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">Compte créé avec succès !</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>

        <!-- Toast erreur -->
        <div id="toastError" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">Une erreur est survenue.</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
